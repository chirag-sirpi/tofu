---
- name: Add HashiCorp Helm repo
  kubernetes.core.helm_repository:
    name: hashicorp
    repo_url: https://helm.releases.hashicorp.com
    state: present

- name: Create vault namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ vault_namespace }}"
    state: present

- name: Deploy HashiCorp Vault (dev mode — auto-unseal for cluster use)
  kubernetes.core.helm:
    name: "{{ vault_release_name }}"
    chart_ref: hashicorp/vault
    chart_version: "{{ vault_chart_version }}"
    release_namespace: "{{ vault_namespace }}"
    create_namespace: true
    wait: true
    wait_condition:
      type: Ready
    values:
      server:
        dev:
          enabled: true          # Auto-unseals; replace with HA + auto-unseal in prod
          devRootToken: "root"
        readinessProbe:
          enabled: true
          path: /v1/sys/health?standbyok=true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      injector:
        enabled: true            # Vault Agent Injector for sidecar secret injection
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "250m"

# ── Seed secrets used by Jenkins pipeline ─────────────────────────────────────
- name: Wait for Vault pod to be ready
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ vault_namespace }}"
    label_selectors:
      - app.kubernetes.io/name=vault
      - component=server
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 120

- name: Enable KV secrets engine in Vault
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: vault-0
    container: vault
    command: >
      sh -c "VAULT_TOKEN=root VAULT_ADDR=http://127.0.0.1:8200
      vault secrets enable -path=secret kv-v2 2>/dev/null || true"

- name: Seed SonarQube token in Vault
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: vault-0
    container: vault
    command: >
      sh -c "VAULT_TOKEN=root VAULT_ADDR=http://127.0.0.1:8200
      vault kv put secret/sonarqube token=REPLACE_WITH_REAL_TOKEN"

- name: Seed GitHub webhook secret in Vault
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: vault-0
    container: vault
    command: >
      sh -c "VAULT_TOKEN=root VAULT_ADDR=http://127.0.0.1:8200
      vault kv put secret/github-webhook secret=REPLACE_WITH_REAL_WEBHOOK_SECRET"

- name: Enable Kubernetes auth method
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: vault-0
    container: vault
    command: >
      sh -c "VAULT_TOKEN=root VAULT_ADDR=http://127.0.0.1:8200
      vault auth enable kubernetes 2>/dev/null || true"

- name: Configure Kubernetes auth method
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: vault-0
    container: vault
    command: >
      sh -c "VAULT_TOKEN=root VAULT_ADDR=http://127.0.0.1:8200
      vault write auth/kubernetes/config
        kubernetes_host=https://kubernetes.default.svc"

- name: Create Jenkins Vault policy
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: vault-0
    container: vault
    command: >
      sh -c "VAULT_TOKEN=root VAULT_ADDR=http://127.0.0.1:8200
      vault policy write jenkins-policy - <<'EOF'
      path \"secret/data/*\" {
        capabilities = [\"read\"]
      }
      EOF"

- name: Create Jenkins Kubernetes auth role
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: vault-0
    container: vault
    command: >
      sh -c "VAULT_TOKEN=root VAULT_ADDR=http://127.0.0.1:8200
      vault write auth/kubernetes/role/jenkins
        bound_service_account_names=jenkins
        bound_service_account_namespaces=jenkins
        policies=jenkins-policy
        ttl=1h"

- name: Enable Vault file audit device (all secret access logged)
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: vault-0
    container: vault
    command: >
      sh -c "VAULT_TOKEN=root VAULT_ADDR=http://127.0.0.1:8200
      vault audit enable file file_path=/vault/logs/audit.log 2>/dev/null || true"

# ── Fluentbit ConfigMap — tail Vault audit log and forward to Loki ─────────────
- name: Create Fluentbit ConfigMap for Vault audit → Loki pipeline
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: fluentbit-vault-audit
        namespace: "{{ vault_namespace }}"
      data:
        vault-audit.conf: |
          [INPUT]
              Name              tail
              Path              /vault/logs/audit.log
              Tag               vault.audit
              Parser            json
              Refresh_Interval  5
              Mem_Buf_Limit     5MB
              Skip_Long_Lines   On

          [FILTER]
              Name    record_modifier
              Match   vault.audit
              Record  cluster devsecops-gke
              Record  source vault-audit

          [OUTPUT]
              Name            loki
              Match           vault.audit
              Host            loki.monitoring.svc.cluster.local
              Port            3100
              Labels          job=vault-audit,namespace={{ vault_namespace }}
              Label_Keys      $request.operation,$request.path,$auth.display_name
              Line_Format     json
              Auto_Kubernetes_Labels  On

- name: Print Vault setup complete
  ansible.builtin.debug:
    msg: >
      Vault deployed at http://vault.vault.svc.cluster.local:8200.
      Dev root token: root.
      Audit log: vault-0:/vault/logs/audit.log → forwarded to Loki via Fluentbit.
      IMPORTANT: Replace dev mode with HA + GCP KMS auto-unseal before production!

