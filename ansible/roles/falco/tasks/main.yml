---
- name: Create falco namespace
  kubernetes.core.k8s:
    name: falco
    api_version: v1
    kind: Namespace
    state: present

- name: Add Falco Helm repo
  kubernetes.core.helm_repository:
    name: falcosecurity
    repo_url: "https://falcosecurity.github.io/charts"

- name: Install Falco with Falcosidekick
  kubernetes.core.helm:
    name: falco
    chart_ref: falcosecurity/falco
    release_namespace: falco
    create_namespace: false
    values:
      # Enable modern ebpf driver for GKE compatibility (Cos node image compatibility)
      driver:
        kind: modern_ebpf
      falco:
        json_output: true
      falcosidekick:
        enabled: true
        webui:
          enabled: true
        # Enable prometheus exporter for dashboard correlation
        prometheus:
          enabled: true
      customRules:
        custom-rules.yaml: |
          - rule: Terminal shell in container
            desc: A shell was spawned inside a container. This is highly suspicious in production.
            condition: container.id != host and proc.name in (bash, sh, zsh, psh, tcsh) and spawned_process
            output: "Terminal shell spawned in container (user=%user.name user_uuid=%user.uid container_id=%container.id container_name=%container.name process=%proc.name parent=%proc.pname cmdline=%proc.cmdline)"
            priority: WARNING
            tags: [container, shell, mitre_execution]

          - rule: Write below app folder
            desc: An attempt to write files inside the application path /app.
            condition: open_write and container.id != host and fd.name startswith /app/ and not proc.name in (gunicorn, python, python3)
            output: "File modification attempt inside /app (file=%fd.name user=%user.name parent=%proc.pname cmdline=%proc.cmdline)"
            priority: CRITICAL
            tags: [container, file, mitre_defense_evasion]
    state: present
