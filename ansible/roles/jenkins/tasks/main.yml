---
- name: Create jenkins namespace
  kubernetes.core.k8s:
    name: jenkins
    api_version: v1
    kind: Namespace
    state: present

- name: Add Jenkins Helm repo
  kubernetes.core.helm_repository:
    name: jenkins
    repo_url: "https://charts.jenkins.io"

- name: Install Jenkins via Helm
  kubernetes.core.helm:
    name: jenkins
    chart_ref: jenkins/jenkins
    release_namespace: jenkins
    create_namespace: false
    values:
      controller:
        serviceType: ClusterIP
        ingress:
          enabled: true
          hostName: jenkins.local
        installPlugins:
          - git:latest
          - workflow-aggregator:latest
          - sonar:latest
          - blueocean:latest
          - kubernetes:latest
          - kubernetes-credentials-provider:latest
          # Jenkins build metrics exposed at /prometheus — scraped by Prometheus
          - prometheus:latest
          # GitHub webhook HMAC validation support
          - github:latest
          # Pipeline stage view for Blue-Green status visibility
          - pipeline-stage-view:latest
          # HTML publisher for ZAP DAST reports
          - htmlpublisher:latest
    state: present
