---
# Scrapes Jenkins /prometheus endpoint for build metrics
# Requires the Prometheus Plugin installed in Jenkins
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jenkins-metrics
  namespace: jenkins
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: jenkins
  namespaceSelector:
    matchNames:
      - jenkins
  endpoints:
    - port: http
      path: /prometheus
      interval: 30s
      scrapeTimeout: 10s

---
# PrometheusRule: Alert on slow builds, high failure rate, queue backup
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: jenkins-alerts
  namespace: jenkins
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: jenkins.rules
      rules:
        - alert: JenkinsBuildFailureRate
          expr: >
            (
              sum(rate(jenkins_builds_failed_build_count_total[30m]))
              /
              sum(rate(jenkins_builds_count_total[30m]))
            ) > 0.3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Jenkins build failure rate > 30%"
            description: "More than 30% of Jenkins builds are failing in the last 30 minutes."

        - alert: JenkinsBuildQueueBacklog
          expr: jenkins_queue_size_value > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Jenkins build queue has {{ $value }} jobs waiting"
            description: "Jenkins queue has been above 5 pending jobs for 5+ minutes — agents may be undersized."

        - alert: JenkinsBuildDurationHigh
          expr: jenkins_builds_last_build_duration_milliseconds > 1800000
          for: 0m
          labels:
            severity: info
          annotations:
            summary: "Jenkins job {{ $labels.jenkins_job }} build took > 30 min"
            description: "Build duration {{ $value }}ms — consider parallelizing stages or caching."
