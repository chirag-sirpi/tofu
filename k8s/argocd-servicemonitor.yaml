---
# PrometheusRule: Alert on ArgoCD sync failures and out-of-sync apps
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argocd-alerts
  namespace: argocd
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: argocd.rules
      rules:
        - alert: ArgoCDAppOutOfSync
          expr: argocd_app_info{sync_status!="Synced"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{ $labels.name }} is OutOfSync"
            description: "App {{ $labels.name }} in project {{ $labels.project }} has sync status {{ $labels.sync_status }} for 5+ minutes."

        - alert: ArgoCDAppUnhealthy
          expr: argocd_app_info{health_status!="Healthy"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD app {{ $labels.name }} is Unhealthy"
            description: "App {{ $labels.name }} health status is {{ $labels.health_status }}."

        - alert: ArgoCDSyncFailed
          expr: increase(argocd_app_sync_total{phase="Failed"}[10m]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD sync failed for {{ $labels.name }}"
            description: "App {{ $labels.name }} had a sync failure in the last 10 minutes."
