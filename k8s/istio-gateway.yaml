apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: devsecops-gateway
  namespace: production
spec:
  selector:
    istio: ingressgateway # use default ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: devsecops-flask-route
  namespace: production
spec:
  hosts:
    - "*"
  gateways:
    - devsecops-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: devsecops-flask
            port:
              number: 80
